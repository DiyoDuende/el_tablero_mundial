<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 TABLERO MUNDIAL - Geopolítica Global</title>
    <!-- Leaflet CSS y JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Estilos propios -->
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
    <div class="app">
        <!-- BARRA SUPERIOR -->
        <div class="top-bar">
            <div class="logo">🌍 TABLERO MUNDIAL</div>
            <div class="top-nav">
                <button id="btn-modo-real" class="nav-btn active">🌐 MODO REAL</button>
                <button id="btn-modo-juego" class="nav-btn">🎮 MODO JUEGO</button>
                <button id="btn-verificador" class="nav-btn">✅ VERIFICADOR</button>
            </div>
        </div>

        <!-- BUSCADOR GLOBAL -->
        <div class="buscador-global">
            <input type="text" id="buscador" placeholder="🔍 Buscar país, ciudad, región...">
            <button id="btn-buscar">BUSCAR</button>
        </div>

        <!-- CAPAS DE PODER -->
        <div class="capas-poder">
            <button class="capa-btn active" data-capa="economia">💰 ECONOMÍA</button>
            <button class="capa-btn" data-capa="politica">🏛️ POLÍTICA</button>
            <button class="capa-btn" data-capa="militar">⚔️ MILITAR</button>
            <button class="capa-btn" data-capa="energia">⚡ ENERGÍA</button>
            <button class="capa-btn" data-capa="social">👥 SOCIAL</button>
            <button class="capa-btn" data-capa="clima">🌍 CLIMA</button>
        </div>

        <!-- CONTENEDOR PRINCIPAL: MAPA + VERIFICADOR -->
        <div class="contenedor-principal">
            <div id="mapa" class="mapa"></div>
            <div id="verificador-panel" class="verificador-panel" style="display: none;">
                <h3>✅ VERIFICADOR CIUDADANO</h3>
                <input type="text" id="pregunta-verificador" placeholder="Ej: ¿Es verdad que han subido los impuestos?">
                <button id="btn-verificar">VERIFICAR</button>
                <div id="respuesta-verificador" class="respuesta"></div>
            </div>
        </div>

        <!-- DASHBOARD DE INFORMACIÓN -->
        <div id="dashboard" class="dashboard">
            <div class="placeholder">🌍 Haz clic en cualquier país para ver sus datos</div>
        </div>

        <!-- ZONA DE SIMULACIÓN -->
        <div id="simulador-panel" class="simulador-panel">
            <h3>⚡ ZONA DE SIMULACIÓN</h3>
            <div class="simulador-input">
                <input type="text" id="escenario" placeholder="🎲 ¿Qué pasaría si... (ej: sube el petróleo un 20%)">
                <button id="btn-simular">SIMULAR</button>
            </div>
            <div id="resultado-simulacion" class="resultado-simulacion"></div>
        </div>

        <!-- FOOTER CON FUENTES -->
        <div class="footer">
            📚 FUENTES: Banco Mundial · INE · Eurostat · Datos abiertos gubernamentales
        </div>
    </div>

    <script src="js/datos.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
